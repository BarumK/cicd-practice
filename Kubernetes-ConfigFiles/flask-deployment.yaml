apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      imagePullSecrets:
      - name: dockerhub-secret
      containers:
      - name: flask-container
        image: barumk/flask-practice:22
        ports:
        - containerPort: 5000